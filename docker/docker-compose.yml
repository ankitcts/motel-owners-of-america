version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: moa-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: moa_admin
      MONGO_INITDB_ROOT_PASSWORD: moa_secret_2024
      MONGO_INITDB_DATABASE: motel_owners
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    command: ["mongod", "--quiet"]

  mongo-express:
    image: mongo-express:latest
    container_name: moa-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: moa_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: moa_secret_2024
      ME_CONFIG_MONGODB_URL: mongodb://moa_admin:moa_secret_2024@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

volumes:
  mongo_data:
